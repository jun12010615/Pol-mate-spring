spring.application.name=pol-mate-spring

# ── 로컬 시크릿 오버라이드 (application-local.properties, gitignore됨) ──
spring.config.import=optional:classpath:application-local.properties

# ── DB ──────────────────────────────────────────────────────────
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/pol-mate?characterEncoding=UTF-8&serverTimezone=Asia%2FSeoul}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ── JPA ──────────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# ── 인코딩 ───────────────────────────────────────────────────────
spring.web.resources.add-mappings=true
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.force=true

# ── 파일 업로드 ──────────────────────────────────────────────────
spring.servlet.multipart.max-file-size=100MB
spring.servlet.multipart.max-request-size=105MB

# ── 메일 (FindAccount SMTP) ──────────────────────────────────────
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.default-encoding=UTF-8

# ── 외부 서비스 ──────────────────────────────────────────────────
polmate.serv.base-url=${POLMATE_SERV_URL:http://localhost:5001}
clova.speech.invoke-url=https://clovaspeech-gw.ncloud.com/recog/v1/stt
clova.speech.secret-key=${CLOVA_SECRET_KEY:}
ollama.url=${OLLAMA_URL:http://localhost:11434/api/generate}
law.api.oc=PolmateAPI

server.port=8080
